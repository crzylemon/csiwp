<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSIWP Alpha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
    canvas { background: #1a1a2e; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'js/game.js?v=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
