<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSIWP Level Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #222;
      color: #eee;
      font-family: monospace;
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 220px;
      padding: 12px;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    #sidebar h2 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    #sidebar label {
      font-size: 11px;
      display: block;
      margin-top: 6px;
    }
    #sidebar input {
      width: 100%;
      background: #333;
      border: 1px solid #555;
      color: #eee;
      padding: 4px;
      font-size: 12px;
    }
    #sidebar button {
      padding: 6px 8px;
      background: #444;
      border: 1px solid #666;
      color: #eee;
      cursor: pointer;
      font-size: 11px;
    }
    #sidebar button:hover {
      background: #555;
    }
    #sidebar button.active {
      background: #0a84ff;
      border-color: #0a84ff;
    }
    .tool-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    #canvas-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }
    #output {
      width: 100%;
      height: 120px;
      background: #111;
      border: 1px solid #555;
      color: #0f0;
      font-size: 10px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Level Editor</h2>

    <label>Level Width (px)</label>
    <input type="number" id="levelWidth" value="400" step="8">
    <label>Level Height (px)</label>
    <input type="number" id="levelHeight" value="120" step="8">

    <label>Tool</label>
    <div class="tool-row">
      <button id="tool-platform" class="active">Platform</button>
      <button id="tool-hazard">Hazard</button>
      <button id="tool-conveyor">Conveyor</button>
      <button id="tool-spring">Spring</button>
      <button id="tool-movplat">MovPlat</button>
      <button id="tool-airvent">AirVent</button>
      <button id="tool-door">Door</button>
      <button id="tool-hiddenspike">HidSpike</button>
      <button id="tool-text">Text</button>
      <button id="tool-spawn">Spawn</button>
      <button id="tool-goal">Goal</button>
      <button id="tool-erase">Erase</button>
    </div>

    <label>Conveyor Direction</label>
    <div class="tool-row">
      <button id="conv-left" class="active">Left</button>
      <button id="conv-right">Right</button>
    </div>
    <label>Conveyor Speed</label>
    <input type="number" id="convSpeed" value="40" step="5">

    <label>Text Index</label>
    <input type="number" id="textIndex" value="0" min="0">
    <label>Text Scale</label>
    <input type="number" id="textScale" value="1" min="0.25" step="0.25">

    <label>Spring Force</label>
    <input type="number" id="springForce" value="300" step="25">
    <label>Spring Rotation (degrees)</label>
    <input type="number" id="springRotation" value="0" step="90">

    <label>MovPlat Width (tiles)</label>
    <input type="number" id="mpWidth" value="3" min="1">
    <label>MovPlat Speed</label>
    <input type="number" id="mpSpeed" value="30" step="5">
    <label style="font-size:10px;color:#aaa;">Click = place start, Shift+Click = add waypoint to last placed</label>

    <label>AirVent Rotation (0=up 90=right 180=down 270=left)</label>
    <input type="number" id="ventRotation" value="0" step="90">
    <label>AirVent Force</label>
    <input type="number" id="ventForce" value="200" step="25">
    <label>AirVent Range (px)</label>
    <input type="number" id="ventRange" value="40" step="8">

    <label>Door Height (tiles)</label>
    <input type="number" id="doorHeight" value="3" min="2">
    <label>Door Open Time (sec)</label>
    <input type="number" id="doorOpenTime" value="3" step="0.5">
    <label>Door Close Time (sec)</label>
    <input type="number" id="doorCloseTime" value="2" step="0.5">

    <button id="btn-export" style="margin-top:12px; background:#0a84ff;">Export JSON</button>
    <button id="btn-import">Import JSON</button>
    <button id="btn-clear">Clear All</button>

    <textarea id="output" placeholder="JSON output will appear here..."></textarea>
  </div>
  <div id="canvas-wrap">
    <canvas id="editor"></canvas>
  </div>

  <script>
// ACCORDING TO ALL KNOWN LAWS OF AVIATION, A BEE SHOULD NOT BE ABLE TO FLY...
    const TILE = 8;
    const SCALE = 4;
    const canvas = document.getElementById('editor');
    const ctx = canvas.getContext('2d');

    let levelWidth = 400;
    let levelHeight = 120;
    let tool = 'platform';
    let convDir = 'left';
    let drawing = false;
    let startTile = null;
    let currentTile = null;

    let spawn = { x: 16, y: 96 };
    let goal = { x: 376, y: 96 };
    let platforms = [];
    let hazards = [];
    let conveyors = [];
    let texts = [];
    let springs = [];
    let movingPlatforms = [];
    let airVents = [];
    let doors = [];
    let hiddenSpikes = [];

    function resize() {
      levelWidth = parseInt(document.getElementById('levelWidth').value) || 400;
      levelHeight = parseInt(document.getElementById('levelHeight').value) || 120;
      canvas.width = levelWidth;
      canvas.height = levelHeight;
      canvas.style.width = levelWidth * SCALE + 'px';
      canvas.style.height = levelHeight * SCALE + 'px';
      render();
    }

    // Tool selection
    document.querySelectorAll('[id^="tool-"]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[id^="tool-"]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool = btn.id.replace('tool-', '');
      });
    });
    document.getElementById('conv-left').addEventListener('click', () => {
      convDir = 'left';
      document.getElementById('conv-left').classList.add('active');
      document.getElementById('conv-right').classList.remove('active');
    });
    document.getElementById('conv-right').addEventListener('click', () => {
      convDir = 'right';
      document.getElementById('conv-right').classList.add('active');
      document.getElementById('conv-left').classList.remove('active');
    });

    document.getElementById('levelWidth').addEventListener('change', resize);
    document.getElementById('levelHeight').addEventListener('change', resize);

    function getTile(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE / TILE) * TILE;
      const y = Math.floor((e.clientY - rect.top) / SCALE / TILE) * TILE;
      return { x, y };
    }

    canvas.addEventListener('mousedown', (e) => {
      const tile = getTile(e);
      if (tool === 'spawn') {
        spawn = { x: tile.x, y: tile.y };
        render();
        return;
      }
      if (tool === 'goal') {
        goal = { x: tile.x, y: tile.y };
        render();
        return;
      }
      if (tool === 'text') {
        const textIndex = parseInt(document.getElementById('textIndex').value) || 0;
        const scale = parseFloat(document.getElementById('textScale').value) || 1;
        texts.push({ x: tile.x, y: tile.y, textIndex, scale });
        render();
        return;
      }
      if (tool === 'spring') {
        const force = parseInt(document.getElementById('springForce').value) || 300;
        const rotation = parseInt(document.getElementById('springRotation').value) || 0;
        springs.push({ x: tile.x, y: tile.y, width: 8, height: 8, force, rotation });
        render();
        return;
      }
      if (tool === 'movplat') {
        const w = (parseInt(document.getElementById('mpWidth').value) || 3) * TILE;
        const speed = parseInt(document.getElementById('mpSpeed').value) || 30;
        if (e.shiftKey && movingPlatforms.length > 0) {
          // Add waypoint to last placed moving platform
          const last = movingPlatforms[movingPlatforms.length - 1];
          last.waypoints.push({ x: tile.x, y: tile.y });
        } else {
          // New moving platform
          movingPlatforms.push({
            x: tile.x, y: tile.y, width: w, height: 8, speed,
            waypoints: [{ x: tile.x, y: tile.y }]
          });
        }
        render();
        return;
      }
      if (tool === 'airvent') {
        const rotation = parseInt(document.getElementById('ventRotation').value) || 0;
        const force = parseInt(document.getElementById('ventForce').value) || 200;
        const range = parseInt(document.getElementById('ventRange').value) || 40;
        airVents.push({ x: tile.x, y: tile.y, rotation, force, range });
        render();
        return;
      }
      if (tool === 'door') {
        const height = (parseInt(document.getElementById('doorHeight').value) || 3) * TILE;
        const openTime = parseFloat(document.getElementById('doorOpenTime').value) || 3;
        const closeTime = parseFloat(document.getElementById('doorCloseTime').value) || 2;
        doors.push({ x: tile.x, y: tile.y, height, openTime, closeTime });
        render();
        return;
      }
      if (tool === 'hiddenspike') {
        hiddenSpikes.push({ x: tile.x, y: tile.y, triggerDistance: 20 });
        render();
        return;
      }
      if (tool === 'erase') {
        eraseAt(tile.x, tile.y);
        render();
        return;
      }
      drawing = true;
      startTile = tile;
      currentTile = tile;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!drawing) return;
      currentTile = getTile(e);
      render();
    });

    canvas.addEventListener('mouseup', () => {
      if (!drawing) return;
      drawing = false;
      const rect = makeRect(startTile, currentTile);
      if (rect.width === 0 || rect.height === 0) return;

      if (tool === 'platform') platforms.push(rect);
      else if (tool === 'hazard' && rect.width > 1 && rect.height == 1) hazards.push(rect);
      else if (tool === 'conveyor') {
        conveyors.push({
          ...rect,
          direction: convDir,
          speed: parseInt(document.getElementById('convSpeed').value) || 40,
        });
      }
      render();
    });

    function makeRect(a, b) {
      const x = Math.min(a.x, b.x);
      const y = Math.min(a.y, b.y);
      const w = Math.abs(b.x - a.x) + TILE;
      const h = Math.abs(b.y - a.y) + TILE;
      return { x, y, width: w, height: h };
    }

    function eraseAt(tx, ty) {
      platforms = platforms.filter(p => !contains(p, tx, ty));
      hazards = hazards.filter(h => !contains(h, tx, ty));
      conveyors = conveyors.filter(c => !contains(c, tx, ty));
      texts = texts.filter(t => !(t.x === tx && t.y === ty));
      springs = springs.filter(s => !(s.x === tx && s.y === ty));
      movingPlatforms = movingPlatforms.filter(mp => {
        // erase if clicking on start position or any waypoint
        if (mp.x === tx && mp.y === ty) return false;
        mp.waypoints = mp.waypoints.filter(w => !(w.x === tx && w.y === ty));
        return true;
      });
      airVents = airVents.filter(v => !(v.x === tx && v.y === ty));
      doors = doors.filter(d => !(d.x === tx && d.y === ty));
      hiddenSpikes = hiddenSpikes.filter(s => !(s.x === tx && s.y === ty));
    }

    function contains(rect, tx, ty) {
      return tx >= rect.x && tx < rect.x + rect.width && ty >= rect.y && ty < rect.y + rect.height;
    }

    function render() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, levelWidth, levelHeight);

      // the grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      for (let x = 0; x < levelWidth; x += TILE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, levelHeight); ctx.stroke();
      }
      for (let y = 0; y < levelHeight; y += TILE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(levelWidth, y); ctx.stroke();
      }

      // platforms
      ctx.fillStyle = '#3a3a5c';
      for (const p of platforms) ctx.fillRect(p.x, p.y, p.width, p.height);

      // hazards aka spikes
      ctx.fillStyle = '#ff2255';
      for (const h of hazards) ctx.fillRect(h.x, h.y, h.width, h.height);

      // conveyer belts
      ctx.fillStyle = '#5588ff';
      for (const c of conveyors) {
        ctx.fillRect(c.x, c.y, c.width, c.height);
        ctx.fillStyle = '#fff';
        ctx.font = '4px monospace';
        ctx.fillText(c.direction[0].toUpperCase(), c.x + 1, c.y + 6);
        ctx.fillStyle = '#5588ff';
      }

      // spawn
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(spawn.x, spawn.y, TILE, TILE);

      // goal
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(goal.x, goal.y, TILE, TILE);

      // text
      ctx.fillStyle = '#88ddff';
      ctx.font = '4px monospace';
      for (const t of texts) {
        ctx.fillRect(t.x, t.y, TILE, TILE);
        ctx.fillStyle = '#fff';
        ctx.fillText('T' + t.textIndex, t.x + 1, t.y + 5);
        ctx.fillStyle = '#88ddff';
      }

      // springs
      ctx.fillStyle = '#44ff44';
      ctx.font = '4px monospace';
      for (const s of springs) {
        ctx.fillRect(s.x, s.y, TILE, TILE);
        ctx.fillStyle = '#fff';
        ctx.fillText('S', s.x + 2, s.y + 6);
        ctx.fillStyle = '#44ff44';
      }

      // moving platforms
      for (const mp of movingPlatforms) {
        // Draw platform rect
        ctx.fillStyle = '#aa66ff';
        ctx.fillRect(mp.x, mp.y, mp.width, mp.height || 8);
        // Draw waypoints and lines
        ctx.strokeStyle = '#aa66ff';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < mp.waypoints.length; i++) {
          const wp = mp.waypoints[i];
          if (i > 0) {
            const prev = mp.waypoints[i - 1];
            ctx.beginPath();
            ctx.moveTo(prev.x + mp.width / 2, prev.y + 4);
            ctx.lineTo(wp.x + mp.width / 2, wp.y + 4);
            ctx.stroke();
          }
          // Waypoint dot
          ctx.fillStyle = i === 0 ? '#aa66ff' : '#ff66aa';
          ctx.fillRect(wp.x + mp.width / 2 - 1, wp.y + 3, 3, 3);
        }
      }

      // air vents
      for (const v of airVents) {
        ctx.fillStyle = '#66ccff';
        ctx.fillRect(v.x, v.y, TILE, TILE);
        // Draw direction arrow
        ctx.fillStyle = '#fff';
        ctx.font = '4px monospace';
        const arrows = { 0: '^', 90: '>', 180: 'v', 270: '<' };
        ctx.fillText(arrows[v.rotation] || '^', v.x + 2, v.y + 6);
      }

      // doors
      for (const d of doors) {
        ctx.fillStyle = '#ff8844';
        ctx.fillRect(d.x, d.y, TILE, d.height);
        // Pulley above
        ctx.fillStyle = '#ffaa66';
        ctx.fillRect(d.x, d.y - TILE, TILE, TILE);
        ctx.fillStyle = '#fff';
        ctx.font = '4px monospace';
        ctx.fillText('D', d.x + 2, d.y + 5);
      }

      // hidden spikes
      for (const s of hiddenSpikes) {
        ctx.strokeStyle = '#ff2255';
        ctx.lineWidth = 0.5;
        ctx.setLineDash([1, 1]);
        ctx.strokeRect(s.x, s.y, TILE, TILE);
        ctx.setLineDash([]);
        ctx.fillStyle = '#ff2255';
        ctx.font = '3px monospace';
        ctx.fillText('H', s.x + 2, s.y + 5);
      }

      // preview the thing
      if (drawing && startTile && currentTile) {
        const preview = makeRect(startTile, currentTile);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(preview.x, preview.y, preview.width, preview.height);
      }
    }

    // export
    document.getElementById('btn-export').addEventListener('click', () => {
      const data = {
        width: levelWidth,
        height: levelHeight,
        spawn,
        goal: { ...goal, width: TILE, height: TILE },
        platforms,
        hazards,
        conveyors,
        texts,
        springs,
        movingPlatforms,
        airVents,
        doors,
        hiddenSpikes,
      };
      document.getElementById('output').value = JSON.stringify(data, null, 2);
    });

    // import
    document.getElementById('btn-import').addEventListener('click', () => {
      try {
        const data = JSON.parse(document.getElementById('output').value);
        levelWidth = data.width || 400;
        levelHeight = data.height || 120;
        document.getElementById('levelWidth').value = levelWidth;
        document.getElementById('levelHeight').value = levelHeight;
        spawn = data.spawn || { x: 16, y: 96 };
        goal = data.goal || { x: 376, y: 96 };
        platforms = data.platforms || [];
        hazards = data.hazards || [];
        conveyors = data.conveyors || [];
        texts = data.texts || [];
        springs = data.springs || [];
        movingPlatforms = data.movingPlatforms || [];
        airVents = data.airVents || [];
        doors = data.doors || [];
        hiddenSpikes = data.hiddenSpikes || [];
        resize();
      } catch (e) {
        alert('Invalid JSON');
      }
    });

    // clear
    document.getElementById('btn-clear').addEventListener('click', () => {
      platforms = [];
      hazards = [];
      conveyors = [];
      texts = [];
      springs = [];
      movingPlatforms = [];
      airVents = [];
      doors = [];
      hiddenSpikes = [];
      spawn = { x: 16, y: 96 };
      goal = { x: 376, y: 96 };
      render();
    });
// I HAD VIRTUALLY NO REHEARSAL FOR THAT.
    resize();
  </script>
</body>
</html>
